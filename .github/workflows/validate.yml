name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python scripts compile (3.9 floor)
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: python -m py_compile noveum-ai/scripts/*.py

      - name: Scripts are stdlib-only
        run: |
          ! grep -nE '^\s*(import|from)\s+(requests|httpx|pydantic|click|rich)\b' noveum-ai/scripts/*.py

      - name: SKILL.md frontmatter is valid (real YAML parse)
        run: |
          pip install pyyaml >/dev/null
          python - <<'EOF'
          import re, yaml
          text = open("noveum-ai/SKILL.md").read()
          m = re.match(r"^---\n(.*?)\n---\n", text, re.S)
          assert m, "missing YAML frontmatter"
          # Must parse as real YAML — a stray ': ' in an unquoted description breaks
          # ClawHub and other strict parsers even when a regex check passes.
          d = yaml.safe_load(m.group(1))
          assert isinstance(d, dict), "frontmatter is not a mapping"
          name, desc = d.get("name"), d.get("description")
          assert isinstance(name, str) and re.fullmatch(r"[a-z0-9]+(-[a-z0-9]+)*", name) and len(name) <= 64, "bad name"
          assert isinstance(desc, str) and desc.strip() and len(desc) <= 1024, "bad description"
          # ClawHub runtime metadata, when present, must be well-formed.
          oc = (d.get("metadata") or {}).get("openclaw")
          if oc:
              assert isinstance(oc.get("envVars", []), list), "openclaw.envVars must be a list"
              req = (oc.get("requires") or {}).get("env", [])
              assert isinstance(req, list), "openclaw.requires.env must be a list"
          assert len(text[m.end():].splitlines()) <= 500, "SKILL.md body must stay under 500 lines"
          print("frontmatter OK (YAML valid)")
          EOF

      - name: Reference links resolve (one level deep)
        run: |
          python - <<'EOF'
          import os, re
          missing = []
          text = open("noveum-ai/SKILL.md").read()
          for target in re.findall(r"\]\((references/[^)]+)\)", text):
              if not os.path.exists(os.path.join("noveum-ai", target)):
                  missing.append(target)
          assert not missing, f"broken reference links: {missing}"
          print("links OK")
          EOF
